name: Deploy to Datacenter Server

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository_owner != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compress project
        run: |
          tar -czf ticker-landing.tar.gz projects/ticker-landing

      - name: Upload artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: ticker-landing.tar.gz
          target: ${{ secrets.DEPLOY_PATH || '~/deployments' }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            DEST=${{ secrets.DEPLOY_PATH || '~/deployments' }}
            mkdir -p "$DEST"
            cd "$DEST"
            tar -xzf ticker-landing.tar.gz
            cd projects/ticker-landing
            docker compose up -d --build
