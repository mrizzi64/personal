<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cotizaciones destacadas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient-glow" aria-hidden="true"></div>
    <div class="page-container">
      <header class="page-header">
        <div class="header-content">
          <span class="header-badge">Panel en vivo</span>
          <h1>Cotizaciones destacadas</h1>
          <p>Seleccioná y seguí los tickers que más te interesan en tiempo real.</p>
        </div>
        <div class="header-actions">
          <button id="add-ticker-btn" type="button" class="action-btn add-btn">Agregar ticker</button>
          <button id="refresh-btn" type="button" class="action-btn refresh-btn">Actualizar ahora</button>
        </div>
      </header>

      <main>
        <section id="tickers" class="ticker-grid" aria-live="polite"></section>
      </main>

      <footer class="page-footer">
        <p>
          Datos provistos por Yahoo Finance &mdash;
          <span id="last-updated">Última actualización: --</span>
        </p>
        <p class="caption">
          Si el servicio no responde, intenta nuevamente más tarde o pulsa "Actualizar ahora".
        </p>
      </footer>
    </div>

    <template id="ticker-template">
      <article class="ticker-card">
        <header>
          <div class="ticker-heading">
            <h2 class="ticker-symbol"></h2>
            <button type="button" class="remove-ticker-btn" aria-label="Quitar ticker">Quitar</button>
          </div>
          <span class="ticker-name" aria-live="polite"></span>
        </header>
        <div class="price-line">
          <span class="price" aria-label="Precio actual"></span>
        </div>
        <div class="change-line" aria-live="polite">
          <span class="change-label">Variación:</span>
          <span class="change-value"></span>
          <span class="change-percent"></span>
        </div>
        <p class="updated-at"></p>
        <div class="ticker-actions">
          <a class="details-link" href="#" target="_blank" rel="noopener noreferrer">Ver detalles</a>
        </div>
      </article>
    </template>

    <template id="error-template">
      <div class="error-state" role="alert">
        <p>No pudimos obtener los datos en este momento.</p>
        <p>Revisa tu conexión o vuelve a intentar más tarde.</p>
      </div>
    </template>

    <template id="empty-template">
      <div class="empty-state" role="status">
        <p>No hay tickers seleccionados.</p>
        <p>Usá "Agregar ticker" para incorporar uno nuevo.</p>
      </div>
    </template>

    <script src="app.js" type="module"></script>
  </body>
</html>
